name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに（古いデプロイはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # 公開ルート(/)に来た人をレッスン一覧へ誘導するリダイレクトを生成
      - name: Add root redirect to lessons index
        run: |
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="ja">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=./lessons/index.html" />
            <title>PHPレッスン</title>
          </head>
          <body><a href="./lessons/index.html">レッスン一覧へ</a></body>
          </html>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
